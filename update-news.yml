name: Update News Feed

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install fast-xml-parser

      - name: Fetch latest news
        run: node fetch-news.js

      - name: Commit updated news
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update automated news feed"
          file_pattern: data/news.json